<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ParchoBet Login</title>
</head>

<body style="font-family:Arial;max-width:400px;margin:50px auto;">

<h2 style="text-align:center;">ParchoBet Login</h2>

<input id="username" type="text" placeholder="Username" style="width:100%;padding:10px;margin-bottom:10px;">

<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:10px;">

<button id="loginBtn" style="width:100%;padding:10px;">
Sign In
</button>

<p id="error" style="color:red;"></p>

<script>
document.getElementById("loginBtn").addEventListener("click", function () {

    var user = document.getElementById("username").value.trim();
    var pass = document.getElementById("password").value.trim();

    if (user === "VBALD88" && pass === "1111") {
        window.location.href = "index.html";
    } else {
        document.getElementById("error").textContent = "Грешно потребителско име или парола!";
    }

});
</script>

</body>
</html>
